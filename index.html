<!DOCTYPE html>
<html class="staticrypt-html" lang="ko">
    <head>
        <meta charset="utf-8" />
        <title>행성 셀라 · 입장</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <!-- deck와 동일한 폰트 (Jua = 제목, Gowun Dodum = 본문) -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />

        <style>
            /* ===== deck 디자인 토큰 (밤하늘 톤) ===== */
            :root {
                --night-1: #070b1e;
                --night-2: #0e1430;
                --night-3: #1a2147;
                --star: #fdf6d8;
                --star-soft: #cdd6ff;
                --gold: #e3ad4f;
                --gold-deep: #c98e2f;
                --apricot: #eac08a;
            }

            * { margin: 0; padding: 0; box-sizing: border-box; }

            .staticrypt-html { height: 100%; }

            /* ===== 전체 화면 = 밤하늘 행성 진입 ===== */
            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: 'Gowun Dodum', system-ui, sans-serif;
                color: #f6efe0;
                background: var(--night-1);
                overflow: hidden;
            }

            .staticrypt-content {
                height: 100%;
                /* 위쪽이 밝은 밤하늘 그라데이션 — deck 인트로와 동일 결 */
                background: radial-gradient(120% 120% at 50% 16%, var(--night-3) 0%, var(--night-2) 44%, var(--night-1) 100%);
                position: relative;
            }

            /* 은은한 별 먼지 (배경 레이어) */
            .staticrypt-content::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image:
                    radial-gradient(1.4px 1.4px at 12% 22%, rgba(253,246,216,0.9), transparent),
                    radial-gradient(1.2px 1.2px at 78% 14%, rgba(205,214,255,0.8), transparent),
                    radial-gradient(1px 1px at 33% 38%, rgba(253,246,216,0.7), transparent),
                    radial-gradient(1.3px 1.3px at 64% 30%, rgba(205,214,255,0.7), transparent),
                    radial-gradient(1px 1px at 88% 46%, rgba(253,246,216,0.6), transparent),
                    radial-gradient(1.2px 1.2px at 20% 60%, rgba(205,214,255,0.55), transparent),
                    radial-gradient(1px 1px at 52% 8%, rgba(253,246,216,0.7), transparent),
                    radial-gradient(1.1px 1.1px at 6% 44%, rgba(205,214,255,0.5), transparent);
                pointer-events: none;
            }

            /* 반짝이는 별 몇 개 (deck twinkle 애니메이션 차용) */
            .star-twinkle {
                position: absolute;
                width: 2px; height: 2px;
                border-radius: 50%;
                background: var(--star);
                box-shadow: 0 0 6px 1px rgba(253,246,216,0.8);
                animation: twinkle var(--dur, 4s) ease-in-out infinite;
                animation-delay: var(--delay, 0s);
                pointer-events: none;
            }
            @keyframes twinkle {
                0%, 100% { opacity: 0.25; transform: scale(0.8); }
                50%      { opacity: 1;    transform: scale(1.35); }
            }

            /* ===== 행성(셀라) ===== */
            .planet-wrap {
                position: absolute;
                top: 12%;
                left: 50%;
                transform: translateX(-50%);
                width: 220px; height: 220px;
                display: flex; align-items: center; justify-content: center;
                animation: float 7s ease-in-out infinite;
                pointer-events: none;
            }
            @keyframes float {
                0%, 100% { transform: translateX(-50%) translateY(0); }
                50%      { transform: translateX(-50%) translateY(-12px); }
            }
            .planet {
                width: 132px; height: 132px;
                border-radius: 50%;
                background: radial-gradient(circle at 36% 30%, #fff4dd 0%, var(--apricot) 30%, var(--gold) 56%, var(--gold-deep) 78%, #7a4f23 100%);
                box-shadow:
                    0 0 70px 12px rgba(227,173,79,0.40),
                    0 0 130px 30px rgba(227,173,79,0.18),
                    inset -14px -10px 30px rgba(60,30,10,0.55),
                    inset 10px 8px 22px rgba(255,244,221,0.45);
                position: relative;
            }
            /* 행성 띠(고리) */
            .planet-ring {
                position: absolute;
                top: 50%; left: 50%;
                width: 210px; height: 210px;
                transform: translate(-50%, -50%) rotate(-22deg);
                border-radius: 50%;
                border: 2px solid rgba(234,192,138,0.45);
                border-left-color: rgba(234,192,138,0.08);
                border-right-color: rgba(234,192,138,0.08);
                box-shadow: 0 0 18px rgba(234,192,138,0.25);
            }

            /* ===== 입장 카드 (프로스티드 다크 글래스) ===== */
            .staticrypt-page {
                position: relative;
                z-index: 2;
                min-height: 100%;
                display: flex;
                align-items: flex-end;
                justify-content: center;
                padding: 0 22px 7vh;
            }

            .staticrypt-form {
                width: 100%;
                max-width: 430px;
                text-align: center;
                background: rgba(14, 20, 48, 0.55);
                -webkit-backdrop-filter: blur(9px);
                backdrop-filter: blur(9px);
                border: 1px solid rgba(205, 214, 255, 0.18);
                border-radius: 22px;
                padding: 38px 34px 32px;
                box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            }

            .lock-eyebrow {
                font-family: 'Jua', sans-serif;
                font-size: 12px;
                letter-spacing: 0.42em;
                color: var(--apricot);
                opacity: 0.92;
                margin-bottom: 14px;
            }

            .staticrypt-title {
                font-family: 'Jua', sans-serif;
                font-size: clamp(21px, 5.4vw, 26px);
                line-height: 1.4;
                color: #fbf4e4;
                margin-bottom: 14px;
            }
            .staticrypt-title .accent {
                color: var(--gold);
            }

            .staticrypt-instructions p,
            .lock-desc {
                font-family: 'Gowun Dodum', sans-serif;
                font-size: 14px;
                line-height: 1.85;
                color: var(--star-soft);
                opacity: 0.92;
            }

            .lock-divider {
                width: 38px; height: 1px;
                margin: 20px auto 22px;
                background: linear-gradient(90deg, transparent, rgba(234,192,138,0.7), transparent);
            }

            /* ===== 입력 ===== */
            .staticrypt-password-container {
                position: relative;
                background: rgba(7, 11, 30, 0.6);
                border: 1px solid rgba(205, 214, 255, 0.22);
                border-radius: 12px;
                margin: 0 0 14px;
                transition: border-color 0.2s, box-shadow 0.2s;
            }
            .staticrypt-password-container:focus-within {
                border-color: var(--gold);
                box-shadow: 0 0 0 3px rgba(227, 173, 79, 0.18);
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                background: transparent;
                border: 0;
                outline: 0;
                box-sizing: border-box;
                font-family: 'Gowun Dodum', sans-serif;
                font-size: 15px;
                letter-spacing: 0.04em;
                text-align: center;
                color: var(--star);
                padding: 15px 42px 15px 18px;
            }
            .staticrypt-form input::placeholder {
                color: rgba(205, 214, 255, 0.5);
                letter-spacing: 0.06em;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px; width: 18px;
                padding: 14px;
                position: absolute;
                right: 2px;
                top: 50%;
                transform: translateY(-50%);
                /* 어두운 SVG 아이콘을 밝게 반전 */
                filter: invert(96%) sepia(8%) saturate(600%) hue-rotate(180deg) brightness(105%);
                opacity: 0.55;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 0.85; }

            /* ===== 버튼 ===== */
            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                border: 0;
                outline: 0;
                cursor: pointer;
                font-family: 'Jua', sans-serif;
                font-size: 16px;
                letter-spacing: 0.06em;
                color: #2a1c08;
                padding: 15px;
                border-radius: 12px;
                background: linear-gradient(95deg, var(--gold-deep) 0%, var(--gold) 55%, var(--apricot) 100%);
                box-shadow: 0 8px 22px rgba(227, 173, 79, 0.28);
                transition: filter 0.18s, transform 0.18s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                filter: brightness(106%);
                transform: translateY(-1px);
            }
            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translateY(0);
                filter: brightness(96%);
            }

            .lock-footnote {
                margin-top: 22px;
                font-family: 'Jua', sans-serif;
                font-size: 10.5px;
                letter-spacing: 0.22em;
                color: rgba(205, 214, 255, 0.55);
            }

            /* remember 체크박스 (사용 시) */
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.6em;
                margin: 0 0 14px;
                font-family: 'Gowun Dodum', sans-serif;
                font-size: 13px;
                color: var(--star-soft);
            }
            .staticrypt-remember input[type="checkbox"] { transform: scale(1.3); accent-color: var(--gold); }

            .hidden { display: none !important; }

            /* 로딩 스피너 */
            .staticrypt-spinner-container {
                height: 100%;
                display: flex; align-items: center; justify-content: center;
                background: var(--night-1);
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem; height: 2rem;
                border: 0.25em solid rgba(227, 173, 79, 0.35);
                border-right-color: var(--gold);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }

            @media (max-width: 480px) {
                .planet-wrap { top: 9%; width: 170px; height: 170px; }
                .planet { width: 104px; height: 104px; }
                .planet-ring { width: 168px; height: 168px; }
                .staticrypt-form { padding: 30px 22px 26px; }
            }
            @media (max-height: 640px) {
                .planet-wrap { top: 5%; }
                .staticrypt-page { align-items: center; padding-bottom: 0; }
            }
        </style>
    </head>

                        </div>

                        <label id="staticrypt-remember-label" class="staticrypt-remember hidden">
                            <input id="staticrypt-remember" type="checkbox" name="remember" />

                        <input type="submit" class="staticrypt-decrypt-button" value="행성에 진입하기" />
                    </form>

                    <p class="lock-footnote">✦ 비공개 전달본 · STARSHIP &times; ALTAVA ✦</p>
                </div>
            </div>

        <script>
            // 엔진 주입 변수 (절대 수정 금지 — StatiCrypt가 생성 시 치환)

  const exports = {};

const IV_BITS = 16 * 8;
const HEX_BITS = 4;
const ENCRYPTION_ALGO = "AES-CBC";

/**
 * Translates between utf8 encoded hexadecimal strings
 * and Uint8Array bytes.
 */
const HexEncoder = {
    /**
     * hex string -> bytes
     * @param {string} hexString
     * @returns {Uint8Array}
     */
    parse: function (hexString) {
        if (hexString.length % 2 !== 0) throw "Invalid hexString";
        const arrayBuffer = new Uint8Array(hexString.length / 2);

        for (let i = 0; i < hexString.length; i += 2) {
            const byteValue = parseInt(hexString.substring(i, i + 2), 16);
            if (isNaN(byteValue)) {
                throw "Invalid hexString";
            }
            arrayBuffer[i / 2] = byteValue;
        }
        return arrayBuffer;
    },

    /**
     * bytes -> hex string
     * @param {Uint8Array} bytes
     * @returns {string}
     */
    stringify: function (bytes) {
        const hexBytes = [];

        for (let i = 0; i < bytes.length; ++i) {
            let byteString = bytes[i].toString(16);
            if (byteString.length < 2) {
                byteString = "0" + byteString;
            }
            hexBytes.push(byteString);
        }
        return hexBytes.join("");
    },

/**
 * Translates between utf8 strings and Uint8Array bytes.
 */
const UTF8Encoder = {
    parse: function (str) {
        return new TextEncoder().encode(str);
    },

    stringify: function (bytes) {
        return new TextDecoder().decode(bytes);
    },

/**
 * Salt and encrypt a msg with a password.
 */
async function encrypt(msg, hashedPassword) {
    // Must be 16 bytes, unpredictable, and preferably cryptographically random. However, it need not be secret.
    // https://developer.mozilla.org/en-US/docs/Web/API/SubtleCrypto/encrypt#parameters
    const iv = crypto.getRandomValues(new Uint8Array(IV_BITS / 8));

    const key = await subtle.importKey("raw", HexEncoder.parse(hashedPassword), ENCRYPTION_ALGO, false, ["encrypt"]);

    const encrypted = await subtle.encrypt(
        {
            name: ENCRYPTION_ALGO,
            iv: iv,
        },
        key,
        UTF8Encoder.parse(msg)
    );

    // iv will be 32 hex characters, we prepend it to the ciphertext for use in decryption

 * Decrypt a salted msg using a password.

 * @param {string} encryptedMsg
 * @param {string} hashedPassword
 * @returns {Promise<string>}

    const ivLength = IV_BITS / HEX_BITS;
    const iv = HexEncoder.parse(encryptedMsg.substring(0, ivLength));
    const encrypted = encryptedMsg.substring(ivLength);

    const key = await subtle.importKey("raw", HexEncoder.parse(hashedPassword), ENCRYPTION_ALGO, false, ["decrypt"]);

    const outBuffer = await subtle.decrypt(
        {
            name: ENCRYPTION_ALGO,
            iv: iv,
        },
        key,
        HexEncoder.parse(encrypted)

    return UTF8Encoder.stringify(new Uint8Array(outBuffer));

 *
 * @param {string} password
 * @param {string} salt
 * @returns {Promise<string>}

/**
 * Salt and hash the password so it can be stored in localStorage without opening a password reuse vulnerability.

 * @param {string} password

 * @param {int} iterations

 * @returns {Promise<string>}

async function pbkdf2(password, salt, iterations, hashAlgorithm) {

        {
            name: "PBKDF2",
            hash: hashAlgorithm,

            salt: UTF8Encoder.parse(salt),

function generateRandomSalt() {

    return HexEncoder.stringify(new Uint8Array(bytes));

        "raw",
        HexEncoder.parse(hashedPassword),
        {
            name: "HMAC",
            hash: "SHA-256",
        },
        false,
        ["sign"]
    );

    return HexEncoder.stringify(new Uint8Array(signature));
